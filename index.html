<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Study Hub 2.0</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            📚 Study Hub
            <span>2.0</span>
        </div>


        <nav>

            <button class="nav-btn active" onclick="showPage('dashboard')">
                🏠 Dashboard
            </button>

            <button class="nav-btn" onclick="showPage('learning')">
                📖 Learning Plans
            </button>

            <button class="nav-btn" onclick="showPage('links')">
                🔗 Quick Links
            </button>

            <button class="nav-btn" onclick="showPage('settings')">
                ⚙️ Settings
            </button>

        </nav>


        <button class="theme-btn" onclick="toggleTheme()">
            🌙 Toggle Theme
        </button>

    </aside>



    <!-- MAIN AREA -->
    <main class="main">


        <!-- DASHBOARD -->
        <section id="dashboard" class="page active">

            <h1>
                Welcome back 👋
            </h1>


            <div class="dashboard-grid">


                <div class="card">

                    <h2>
                        📅 Today
                    </h2>

                    <p id="date"></p>

                    <p id="clock"></p>

                </div>



                <div class="card">

                    <h2>
                        📈 Progress
                    </h2>

                    <div class="progress-box">

                        <div id="overallProgress">
                            0%
                        </div>

                    </div>

                </div>


                <div class="card">

                    <h2>
                        📚 Current Plan
                    </h2>

                    <p id="currentPlan">
                        No plan selected
                    </p>

                </div>


            </div>


        </section>





        <!-- LEARNING PLANS -->
        <section id="learning" class="page">


            <div class="page-header">

                <h1>
                    📖 Learning Plans
                </h1>


                <button onclick="createPlan()">
                    + New Plan
                </button>

            </div>



            <div class="plan-manager">


                <label>
                    Current Plan:
                </label>


                <select id="planSelector"
                    onchange="changePlan(this.value)">
                </select>


            </div>




            <div id="learningContainer">

            </div>



        </section>





        <!-- QUICK LINKS -->
        <section id="links" class="page">


            <h1>
                🔗 Quick Links
            </h1>


            <div class="links-grid">


                <a href="https://chat.openai.com" target="_blank">
                    🤖 ChatGPT
                </a>


                <a href="https://docs.google.com" target="_blank">
                    📄 Google Docs
                </a>


                <a href="https://drive.google.com" target="_blank">
                    ☁️ Google Drive
                </a>


                <a href="https://youtube.com" target="_blank">
                    ▶️ YouTube
                </a>


                <a href="https://spotify.com" target="_blank">
                    🎵 Spotify
                </a>


                <a href="https://github.com" target="_blank">
                    💻 GitHub
                </a>


            </div>


        </section>






        <!-- SETTINGS -->
        <section id="settings" class="page">


            <h1>
                ⚙️ Settings
            </h1>


            <div class="card">


                <h2>
                    Study Hub
                </h2>


                <p>
                    Version 2.0 Foundation
                </p>


                <p>
                    Your data is saved automatically on this device.
                </p>


            </div>


        </section>



    </main>


</div>





<script src="js/storage.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/script.js"></script>


</body>
</html>
