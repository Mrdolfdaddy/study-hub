<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Hub</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="script.js"></script>

</head>


<body>


<!-- LOGIN SCREEN -->

<div id="loginScreen">


<div class="loginBox">


<h1>📚 Study Hub</h1>


<h2>Login</h2>


<input 
id="email"
type="email"
placeholder="Email">


<input
id="password"
type="password"
placeholder="Password">


<button onclick="login()">
Login
</button>


<button onclick="signup()">
Create Account
</button>


<p id="loginMessage"></p>


</div>


</div>






<!-- MAIN WEBSITE -->


<div id="app" class="hidden">



<div class="sidebar">


<h1>📚 Study Hub</h1>


<button onclick="logout()">
🚪 Logout
</button>


<button onclick="showPage('home')">
🏠 Home
</button>


<button onclick="showPage('tasks')">
✅ Tasks
</button>


<button onclick="showPage('schedule')">
📅 Schedule
</button>


<button onclick="showPage('homework')">
📝 Homework
</button>


<button onclick="showPage('calendar')">
🗓 Calendar
</button>


<button onclick="showPage('notes')">
📒 Notes
</button>


<button onclick="showPage('links')">
🔗 Links
</button>


<button onclick="showPage('timer')">
⏱ Timer
</button>


<button onclick="showPage('games')">
🎮 Games
</button>


<button onclick="showPage('themes')">
🎨 Themes
</button>


<button onclick="showPage('settings')">
⚙ Settings
</button>


</div>






<div class="main">



<section id="home" class="page">


<h2>
Welcome Back 👋
</h2>


<div class="card">

<h3 id="date"></h3>

<h1 id="time"></h1>

</div>


<div class="card">

<h2>
Daily Progress
</h2>


<div class="progress">

<div id="progressBar"></div>

</div>


<p id="progressText">
0% Complete
</p>


</div>


</section>





<section id="tasks" class="page hidden">


<h2>✅ Tasks</h2>


<div class="card">


<input id="taskInput" placeholder="Add task">


<button onclick="addTask()">
Add
</button>


<ul id="taskList"></ul>


</div>


</section>






<section id="notes" class="page hidden">


<h2>📒 Notes</h2>


<div class="card">


<textarea 
id="notesArea"
placeholder="Write notes...">
</textarea>


<button onclick="saveNotes()">
Save
</button>


</div>


</section>






<section id="games" class="page hidden">


<h2>🎮 Games</h2>


<div class="card">


<button onclick="showGame('snake')">
🐍 Snake
</button>


<button onclick="showGame('slope')">
⚪ Slope
</button>


</div>



<div id="snakeGame" class="gameBox hidden">


<h3>
🐍 Snake
</h3>


<canvas 
id="snakeCanvas"
width="400"
height="400">
</canvas>


</div>





<div id="slopeGame" class="gameBox hidden">


<h3>
⚪ Slope
</h3>


<canvas
id="slopeCanvas"
width="500"
height="400">
</canvas>


</div>


</section>







<section id="settings" class="page hidden">


<h2>
⚙ Settings
</h2>


<div class="card">


<p>
Account settings coming soon
</p>


</div>


</section>




</div>


</div>



</body>

</html>
